{% extends "base.html" %}
{% block title %}Create Post{% endblock %}

{% block content %}
<div class="container">
  <h1>Create a Post</h1>

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Post</button>
  </form>
</div>
{% endblock %}
