{% extends "base.html" %}
{% block title %}Feed · Community Share{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
    <div>
      <h1 class="fw-bold mb-1">Community Feed</h1>
      <div class="text-muted">Search query: <b>{{ request.GET.q|default:"(none)" }}</b></div>
    </div>
    <a class="btn btn-brand" href="/">Back Home</a>
  </div>

  <hr class="my-4">

  <div class="alert alert-light border">
    Next we’ll connect this feed to real posts from the database.
  </div>
</div>
{% endblock %}
