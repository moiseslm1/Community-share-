<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %} Community Share {% endblock %}</title>

    <!-- Bootstrap -->
     <link href="https://cdn.jsdelivr.net/npm/nootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

     <style>
        :root{
            --brand: #0b7a5a;
            --brand-dark: #075a44;
            --mint: #dff5ee;
            --ink: #0f172a;
        }

        body{ color: car(--ink); }

        .navbar-brand{
            font-weight: 800;
            letter-spacing: .2px;
        }

        .btn-brand{
            background: var(--brand);
            background-color: var(--brand);
            color: #fff;
        }

        .btn-brand:hover{
            background: var(--brand-dark);
            background-color: var(--brand-dark);
            color: #fff;
        }

        .hero {
            background: radial-gradient(circle at 85% 20%, #b9f3df 0%, transparent 40%),
                        radial-gradient(circle at 10% 60%, #c7e6ff 0%, transparent 45%),
                        linear-gradient(180deg, #ffffff 0%, #f6fffb 100%);
            border-bottom: 1px solid rgba(15, 23, 42, .06);
            padding: 72px 0 48px;
        }

        .hero h1{
            font-weight: 900;
            line-height: 1.05;
            font-size: clamp(2.2rem, 3.8vw, 3.4rem);
            text-align: center;
        }
        .hero p{
            font-size: 1.05rem;
            color: rgba(15, 23, 42, .75);
            text-align: center;
        }

        .search-wrap{
            max-width: 900px;
            margin: 28px auto 0;
        }

        .search-pill{
            display: flex;
            align-items: stretch;
            border: 2px solid var(--brand);
            border-radius: 999px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 10px 25px rgba(2, 6, 23, .08);
            max-width: 720px;
            margin: 0 auto;
        }

        .search-pill input.form-control{
            flex: 1 1 auto;
            min-width: 0;
            border: 0 !important;
            border-radius: 0 !important;
            outline: none !important;
            box-shadow: none !important;
            padding: 16px 18px;
            font-size: 1.05rem;
        }

        .search-pill button.btn{
            flex: 0 0 84px;
            border: 0;
            border-left: 2px solid var(--brand);
            border-radius: 0 !important;
        }

        .chip-row{
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 18px;
            overflow-x: visible;
        }

        .chip{
            flex: 0 0 auto;
            white-space: nowrap;
            border: 1px solid rgba(15, 23, 42, .2);
            border-radius: 999px;
            padding: 10px 14px;
            background: #fff;
            font-weight: 600;
            font-size: .95rem;
            text-decoration: none;
            color: var(--ink);
        }
        .chip:hover{
            border-color: var(--brand);
            color: var(--brand-dark);
        }

        .category-card{
            border: 1px solid rgba(15, 23, 42, .08);
            border-radius: 18px;
            padding: 18px;
            background: #fff;
            transition: transform .12s ease, box-shadow .12s ease;
            height: 100%;
        }
        .category-card:hover{
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(2, 6, 23, .08);
        }

        .icon-badge{
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: var(--mint);
            color: var(--brand-dark);
            font-weight: 900;
        }

        footer{
            border-top: 1px solid rgba(15, 23, 42, .06);
            padding: 22px 0;
            color: rgba(15, 23, 42, .65);
        }
     </style>

     {% block extra_head %}{% endblock %}
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-white sticky-top border-bottom">
        <div class="container">
        <a class="navbar-brand" href="/">CommunityShare</a>

        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-outline-secondary" href="/feed/">Browse</a>
            <a class="btn btn-brand" href="/admin/">Admin</a>
        </div>
        </div>
    </nav>

  {% block content %}{% endblock %}

  <footer>
    <div class="container d-flex justify-content-between flex-wrap gap-2">
      <div>© {{ now|default:"" }} CommunityShare</div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
